name: Sync Fork with Upstream

on:
  schedule:
    # Runs daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    # Only run on forks — skip if this IS the upstream repo
    if: github.repository != 'lenny-h/cloudbot'
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/lenny-h/cloudbot.git
          git fetch upstream main

      - name: Attempt fast-forward merge
        id: merge
        run: |
          git checkout main

          # Check if there are any upstream changes
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          if [ "$BEHIND" -eq 0 ]; then
            echo "already_up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "Fork is already up to date with upstream."
            exit 0
          fi

          echo "already_up_to_date=false" >> "$GITHUB_OUTPUT"
          echo "Fork is $BEHIND commit(s) behind upstream."

          # Try to merge upstream/main — this will fail on conflicts
          if git merge upstream/main --no-edit; then
            echo "merge_conflict=false" >> "$GITHUB_OUTPUT"
            git push origin main
            echo "Successfully merged and pushed upstream changes."
          else
            echo "merge_conflict=true" >> "$GITHUB_OUTPUT"
            git merge --abort
            echo "Merge conflict detected — will open a PR instead."
          fi

      - name: Create sync branch and PR on conflict
        if: steps.merge.outputs.merge_conflict == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYNC_BRANCH="sync-upstream/$(date +%Y-%m-%d-%H%M%S)"
          git checkout -b "$SYNC_BRANCH" upstream/main
          git push origin "$SYNC_BRANCH"

          gh pr create \
            --base main \
            --head "$SYNC_BRANCH" \
            --title "⬆️ Sync with upstream ($(date +%Y-%m-%d))" \
            --body "$(cat <<'EOF'
          ## Automatic upstream sync

          This PR was created because the automatic sync with the upstream repository
          encountered **merge conflicts** that need manual resolution.

          ### What to do
          1. Check out this branch locally
          2. Resolve the merge conflicts
          3. Test your changes
          4. Merge this PR

          ### Conflict resolution tips
          - **Database migrations**: If conflicts are in `packages/server/src/drizzle/migrations/`,
            you may need to regenerate migrations after resolving schema conflicts (`npx drizzle-kit generate`).
          - **Lock files**: Delete `pnpm-lock.yaml` and run `pnpm install` to regenerate.
          - **Config files**: Carefully merge keeping your customizations while adopting upstream improvements.

          > ⚠️ **Do not force-push or rebase** — this branch is based on `upstream/main`.
          EOF
          )"
