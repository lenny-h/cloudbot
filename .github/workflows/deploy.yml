name: Deploy CloudBot to Cloudflare Workers

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # Job to detect changes in api, web, and dashboard apps
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes.outputs.api }}
      web: ${{ steps.changes.outputs.web }}
      dashboard: ${{ steps.changes.outputs.dashboard }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'package.json'
              - '.github/workflows/deploy.yml'
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - '.github/workflows/deploy.yml'
            dashboard:
              - 'apps/dashboard/**'
              - 'packages/**'
              - 'package.json'
              - '.github/workflows/deploy.yml'

  # Deploy API to Cloudflare Workers
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply D1 database migrations
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/api
          command: d1 migrations apply CLOUDBOT_DB --env=production --remote

      - name: Deploy API to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/api
          command: deploy --minify
          secrets: |
            NODE_ENV
            BETTER_AUTH_URL
            ADMIN_USER_IDS
            ALLOWED_ORIGINS
            ENABLE_EMAIL_SIGNUP
            ENABLE_OAUTH_LOGIN
            ENABLE_SSO
            ALLOWED_EMAIL_DOMAINS
            RESEND_SENDER_EMAIL
            GOOGLE_CLIENT_ID
            GITHUB_CLIENT_ID
            GITLAB_CLIENT_ID
            SSO_DOMAIN
            SSO_PROVIDER_ID
            SSO_CLIENT_ID
            SSO_ISSUER
            SSO_DISCOVERY_ENDPOINT
            SSO_AUTHORIZATION_ENDPOINT
            SSO_TOKEN_ENDPOINT
            SSO_JWKS_ENDPOINT
            NEXT_PUBLIC_LLM_MODELS
            R2_ENDPOINT
            R2_BUCKET_NAME
            CLOUDFLARE_ACCESS_KEY_ID
            AWS_ACCESS_KEY_ID
            AWS_REGION
            AZURE_RESOURCE_NAME
            GOOGLE_VERTEX_PROJECT
            GOOGLE_VERTEX_LOCATION
            GOOGLE_CLIENT_EMAIL
            GOOGLE_PRIVATE_KEY_ID
            SEARCH_PROVIDER
            TITLE_MODEL_IDX
            ARTIFACT_MODEL_IDX
            SEARCH_MODEL_IDX
            COMPLETION_MODEL_IDX

            BETTER_AUTH_SECRET
            ENCRYPTION_KEY
            RESEND_API_KEY
            GOOGLE_CLIENT_SECRET
            GITHUB_CLIENT_SECRET
            GITLAB_CLIENT_SECRET
            SSO_CLIENT_SECRET
            CLOUDFLARE_SECRET_ACCESS_KEY
            AI_GATEWAY_API_KEY
            ANTHROPIC_API_KEY
            ANTHROPIC_AUTH_TOKEN
            AWS_SECRET_ACCESS_KEY
            AZURE_API_KEY
            GOOGLE_PRIVATE_KEY
            OPENAI_API_KEY
            EXA_API_KEY
            PARALLEL_API_KEY
            TAVILY_API_KEY
        env:
          # Non-sensitive configuration vars
          NODE_ENV: ${{ vars.NODE_ENV }}
          BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
          ADMIN_USER_IDS: ${{ vars.ADMIN_USER_IDS }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
          ENABLE_EMAIL_SIGNUP: ${{ vars.ENABLE_EMAIL_SIGNUP }}
          ENABLE_OAUTH_LOGIN: ${{ vars.ENABLE_OAUTH_LOGIN }}
          ENABLE_SSO: ${{ vars.ENABLE_SSO }}
          ALLOWED_EMAIL_DOMAINS: ${{ vars.ALLOWED_EMAIL_DOMAINS }}
          RESEND_SENDER_EMAIL: ${{ vars.RESEND_SENDER_EMAIL }}
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          GITHUB_CLIENT_ID: ${{ vars.GITHUB_CLIENT_ID }}
          GITLAB_CLIENT_ID: ${{ vars.GITLAB_CLIENT_ID }}
          SSO_DOMAIN: ${{ vars.SSO_DOMAIN }}
          SSO_PROVIDER_ID: ${{ vars.SSO_PROVIDER_ID }}
          SSO_CLIENT_ID: ${{ vars.SSO_CLIENT_ID }}
          SSO_ISSUER: ${{ vars.SSO_ISSUER }}
          SSO_DISCOVERY_ENDPOINT: ${{ vars.SSO_DISCOVERY_ENDPOINT }}
          SSO_AUTHORIZATION_ENDPOINT: ${{ vars.SSO_AUTHORIZATION_ENDPOINT }}
          SSO_TOKEN_ENDPOINT: ${{ vars.SSO_TOKEN_ENDPOINT }}
          SSO_JWKS_ENDPOINT: ${{ vars.SSO_JWKS_ENDPOINT }}
          NEXT_PUBLIC_LLM_MODELS: ${{ vars.NEXT_PUBLIC_LLM_MODELS }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          CLOUDFLARE_ACCESS_KEY_ID: ${{ vars.CLOUDFLARE_ACCESS_KEY_ID }}
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AZURE_RESOURCE_NAME: ${{ vars.AZURE_RESOURCE_NAME }}
          GOOGLE_VERTEX_PROJECT: ${{ vars.GOOGLE_VERTEX_PROJECT }}
          GOOGLE_VERTEX_LOCATION: ${{ vars.GOOGLE_VERTEX_LOCATION }}
          GOOGLE_CLIENT_EMAIL: ${{ vars.GOOGLE_CLIENT_EMAIL }}
          GOOGLE_PRIVATE_KEY_ID: ${{ vars.GOOGLE_PRIVATE_KEY_ID }}
          SEARCH_PROVIDER: ${{ vars.SEARCH_PROVIDER }}
          TITLE_MODEL_IDX: ${{ vars.TITLE_MODEL_IDX }}
          ARTIFACT_MODEL_IDX: ${{ vars.ARTIFACT_MODEL_IDX }}
          SEARCH_MODEL_IDX: ${{ vars.SEARCH_MODEL_IDX }}
          COMPLETION_MODEL_IDX: ${{ vars.COMPLETION_MODEL_IDX }}

          # Sensitive secrets
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          GITLAB_CLIENT_SECRET: ${{ secrets.GITLAB_CLIENT_SECRET }}
          SSO_CLIENT_SECRET: ${{ secrets.SSO_CLIENT_SECRET }}
          CLOUDFLARE_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_SECRET_ACCESS_KEY }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

  # Deploy Web App to Cloudflare Workers
  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'
    env:
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_ENABLE_EMAIL_SIGNUP: ${{ vars.NEXT_PUBLIC_ENABLE_EMAIL_SIGNUP }}
      NEXT_PUBLIC_ENABLE_OAUTH_LOGIN: ${{ vars.NEXT_PUBLIC_ENABLE_OAUTH_LOGIN }}
      NEXT_PUBLIC_ENABLE_SSO: ${{ vars.NEXT_PUBLIC_ENABLE_SSO }}
      NEXT_PUBLIC_CSP_ENDPOINTS: ${{ vars.NEXT_PUBLIC_CSP_ENDPOINTS }}
      NEXT_PUBLIC_LLM_MODELS: ${{ vars.NEXT_PUBLIC_LLM_MODELS }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web App
        run: pnpm run build-cloudflare
        working-directory: apps/web

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/web
          command: deploy --minify

  # Deploy Dashboard App to Cloudflare Workers
  deploy-dashboard:
    name: Deploy Dashboard App
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_ENABLE_EMAIL_SIGNUP: ${{ secrets.NEXT_PUBLIC_ENABLE_EMAIL_SIGNUP }}
      NEXT_PUBLIC_ENABLE_OAUTH_LOGIN: ${{ secrets.NEXT_PUBLIC_ENABLE_OAUTH_LOGIN }}
      NEXT_PUBLIC_ENABLE_SSO: ${{ secrets.NEXT_PUBLIC_ENABLE_SSO }}
      NEXT_PUBLIC_CSP_ENDPOINTS: ${{ secrets.NEXT_PUBLIC_CSP_ENDPOINTS }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Dashboard App
        run: pnpm run build-cloudflare
        working-directory: apps/dashboard

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/dashboard
          command: deploy --minify
